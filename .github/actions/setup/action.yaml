name: Setup
description: Perform standard setup and install dependencies using pnpm.

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v5
    - name: Install node
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        node-version: 24.14.0
    - name: Install dependencies
      shell: bash
      run: pnpm install